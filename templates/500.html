{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error del servidor | Homie</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'img/logo.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #fdf6ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3f3a2f;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 560px;
        }
        .big-emoji {
            font-size: 6rem;
            display: block;
            animation: shake 1.2s infinite ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            20% { transform: rotate(-8deg); }
            40% { transform: rotate(8deg); }
            60% { transform: rotate(-5deg); }
            80% { transform: rotate(5deg); }
        }
        .code {
            font-size: 7rem;
            font-weight: 900;
            color: #c0392b;
            line-height: 1;
            letter-spacing: -4px;
            margin: 15px 0 5px;
        }
        h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #4b3720;
            margin-bottom: 12px;
        }
        p {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #a9845c, #7a5c38);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(120,80,40,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(120,80,40,0.4);
        }
        .logo-top {
            position: absolute;
            top: 24px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #6b8f71;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .logo-top img { width: 32px; height: 32px; border-radius: 8px; }
    </style>
</head>
<body>
    <a href="{% url 'inicio' %}" class="logo-top">
        <img src="{% static 'img/logo.png' %}" alt="Homie">
        Homie
    </a>
    <div class="container">
        <span class="big-emoji">🔧</span>
        <div class="code">500</div>
        <h1>Algo ha ido mal en el servidor</h1>
        <p>No te preocupes, no es culpa tuya.<br>Algo interno se ha roto y ya estamos en ello.</p>
        <a href="{% url 'inicio' %}" class="btn">🏠 Volver a mis casas</a>
    </div>
</body>
</html>
