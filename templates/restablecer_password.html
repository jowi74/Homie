{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Restablecer Contraseña | Homie</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/acc.css' %}">
    <link rel="icon" type="image/png" href="{% static 'img/logo.png' %}">
</head>

<body>
    <main class="auth-container">
        <section class="auth-card">
            <a href="{% url 'inicio' %}" class="logo-link"
                style="display:inline-block; transition: transform 0.3s ease;"
                onmouseover="this.style.transform='scale(1.15) translateY(-2px)'"
                onmouseout="this.style.transform='scale(1)'">
                <img src="{% static 'img/logo.png' %}" alt="Homie Logo"
                    style="height: 75px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));">
            </a>
            <h2 style="font-size: 1.5rem; margin-bottom: 5px;">Nueva Contraseña</h2>
            <p style="text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 20px;">Código enviado a: <b>{{
                    email }}</b></p>

            {% if error %}
            <p class="error-msg"
                style="color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 6px; font-size: 0.9rem; text-align: center; margin-bottom: 15px;">
                {{ error }}</p>
            {% endif %}

            <form method="post" style="text-align: left;">
                {% csrf_token %}
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="code" style="display:block; margin-bottom:5px; color:#4a3520;">Código de verificación
                        recibido en el email:</label>
                    <input type="text" id="code" name="code" placeholder="Ej: 123456" required
                        style="width: 100%; padding: 10px; border: 1px solid #c9a97a; border-radius: 6px; font-size: 1rem; box-sizing: border-box; text-align: center; letter-spacing: 2px; font-weight: bold;">
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="new_password" style="display:block; margin-bottom:5px; color:#4a3520;">Nueva
                        contraseña:</label>
                    <input type="password" id="new_password" name="new_password" required
                        style="width: 100%; padding: 10px; border: 1px solid #c9a97a; border-radius: 6px; font-size: 1rem; box-sizing: border-box;">
                </div>

                <div class="form-group" style="margin-bottom: 25px;">
                    <label for="confirm_password" style="display:block; margin-bottom:5px; color:#4a3520;">Repetir nueva
                        contraseña:</label>
                    <input type="password" id="confirm_password" name="confirm_password" required
                        style="width: 100%; padding: 10px; border: 1px solid #c9a97a; border-radius: 6px; font-size: 1rem; box-sizing: border-box;">
                </div>

                <button type="submit" class="btn primary" style="width: 100%; margin-bottom: 15px;">Cambiar
                    Contraseña</button>
            </form>

            <p class="auth-link" style="text-align: center;">
                <a href="{% url 'login' %}">Cancelar y volver</a>
            </p>
        </section>
    </main>
</body>

</html>
