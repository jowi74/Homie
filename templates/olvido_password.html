{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña | Homie</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/acc.css' %}">
    <link rel="icon" type="image/png" href="{% static 'img/logo.png' %}">
</head>
<body>
    <main class="auth-container">
        <section class="auth-card">
            <a href="{% url 'inicio' %}" class="logo-link" style="display:inline-block; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.15) translateY(-2px)'" onmouseout="this.style.transform='scale(1)'">
                <img src="{% static 'img/logo.png' %}" alt="Homie Logo" style="height: 75px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));">
            </a>
            <h2>Recuperar Contraseña</h2>
            
            {% if error %}
            <p class="error-msg" style="color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 6px; font-size: 0.9rem; text-align: center; margin-bottom: 15px;">{{ error }}</p>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group" style="margin-bottom: 20px; text-align: left;">
                    <label for="email" style="display:block; margin-bottom:5px; color:#4a3520;">E-mail de tu cuenta:</label>
                    <input type="email" id="email" name="email" required style="width: 100%; padding: 10px; border: 1px solid #c9a97a; border-radius: 6px; font-size: 1rem; box-sizing: border-box;">
                </div>
                
                <button type="submit" class="btn primary" style="width: 100%; margin-bottom: 15px;">Enviar Código</button>
            </form>
            
            <p class="auth-link">
                <a href="{% url 'login' %}">⬅ Volver al Login</a>
            </p>
        </section>
    </main>
</body>
</html>
